# Blocco da copiare in /etc/nginx/sites-available/guardini sul server.
# Espone l'app (container Docker su 127.0.0.1:8504) sulla porta pubblica 8507.
# Nessun blocco "map $http_upgrade" qui: se un altro sito abilitato lo
# definisce già, nginx -t fallisce per direttiva duplicata.

server {
    listen 8507;
    server_name _;

    client_max_body_size 200M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:8504;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
