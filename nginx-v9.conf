# Blocco per la webapp v9 (FastAPI+React) — NON sostituisce il sito della v8.
# Da copiare sul server come /etc/nginx/sites-available/guardini-v9 e linkare:
#   cp nginx-v9.conf /etc/nginx/sites-available/guardini-v9
#   ln -s /etc/nginx/sites-available/guardini-v9 /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# Espone il container guardini-v9 (127.0.0.1:8508) sulla porta pubblica 8509.
# La v8 del cliente resta su 8507 (sito "guardini", invariato).

server {
    listen 8509;
    server_name _;

    client_max_body_size 200M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:8508;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
